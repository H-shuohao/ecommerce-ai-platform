name: AI Core Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-core

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/ai-core/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run automated tests
        env:
          PYTHONUTF8: "1"
        run: python -m unittest discover -s tests -v
